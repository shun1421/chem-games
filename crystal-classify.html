<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>結晶ソムリエ | 化学ゲームラボ</title>
<style>
:root{--paper:#f3f6f5;--card:#fff;--ink:#1b2a33;--mut:#5b6f78;--line:#d5e0de;
--acc:#0e7c86;--amber:#e8a13d;--bad:#d4566a;--ok:#2e9e6b;
--mono:"SFMono-Regular",Consolas,"Courier New",monospace}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);
font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Yu Gothic",Meiryo,sans-serif}
header{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--card);border-bottom:3px solid var(--acc)}
.back{color:var(--acc);text-decoration:none;font-weight:700;font-size:14px}
.htitle{font-weight:800;letter-spacing:.05em}
.chip{margin-left:auto;font-size:12px;color:var(--acc);border:1px solid var(--acc);border-radius:999px;padding:2px 10px}
main{max-width:720px;margin:0 auto;padding:20px 14px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;box-shadow:0 2px 10px rgba(27,42,51,.05)}
.hidden{display:none}
h1{font-size:22px;margin:0 0 8px}
.desc{color:var(--mut)}
.rules{color:var(--mut);font-size:14px;padding-left:20px;line-height:1.8}
button.primary{display:block;width:100%;margin-top:14px;padding:14px;font-size:17px;font-weight:800;color:#fff;background:var(--acc);border:0;border-radius:10px;cursor:pointer}
.ghost{display:block;text-align:center;margin-top:12px;color:var(--acc);font-weight:700;text-decoration:none}
.hud{display:flex;gap:8px;justify-content:space-between;font-size:13px;color:var(--mut)}
.hud b{font-family:var(--mono);font-size:18px;color:var(--ink);margin-left:4px}
#tbar{height:6px;background:var(--line);border-radius:3px;margin:10px 0}
#tfill{height:100%;width:100%;background:var(--acc);border-radius:3px;transition:width .1s linear}
#formula{min-height:80px;display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:800;margin:6px 0}
#formula.mystery{color:var(--amber)}
#sub{text-align:center;color:var(--mut);font-size:14px;min-height:20px}
#qa{margin:10px 0;display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.qchip{border:1.5px solid var(--acc);color:var(--acc);background:#fff;border-radius:999px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer}
.qchip:disabled{opacity:.35;cursor:default}
#log{font-size:14px;color:var(--ink);min-height:20px;text-align:center;line-height:1.9;margin-bottom:6px}
#log b{color:var(--acc)}
#types{display:grid;grid-template-columns:1fr 1fr;gap:10px}
#types button{padding:16px 6px;font-size:16px;font-weight:800;background:#fff;border:2px solid var(--line);border-radius:10px;cursor:pointer;color:var(--ink)}
#types button.correct{border-color:var(--ok);background:#e9f7f0}
#types button.wrong{border-color:var(--bad);background:#fbeef0}
#fb{min-height:44px;margin-top:12px;font-size:14px;color:var(--mut);text-align:center;line-height:1.6}
#fb .good{color:var(--ok);font-weight:800}
#fb .bad{color:var(--bad);font-weight:800}
.result{font-size:18px;text-align:center;line-height:2}
.result b{font-family:var(--mono);font-size:34px;color:var(--acc)}
sub,sup{font-size:.62em}
</style>
</head>
<body>
<header>
  <a class="back" href="index.html">‹ 一覧</a>
  <div class="htitle">結晶ソムリエ</div>
  <span class="chip">化学結合</span>
</header>
<main>
<section id="start" class="panel">
  <h1>結晶ソムリエ</h1>
  <p class="desc">化学式を見て「イオン結晶・分子結晶・共有結合の結晶・金属結晶」の4つに分類しよう。
  ときどき現れる「？？？」はミステリー問題。性質についての質問を選んで、返ってくる「はい/いいえ」から結晶の種類を推理する。</p>
  <ul class="rules">
    <li>制限時間は120秒。ふつうの問題は100点+連続ボーナス</li>
    <li>ミステリー問題は200点スタート。質問1回ごとに−50点(質問は3回まで)</li>
    <li>質問せずに当てられれば200点満点！</li>
  </ul>
  <button class="primary" onclick="startGame()">スタート</button>
</section>

<section id="play" class="panel hidden">
  <div class="hud">
    <div>のこり<b id="time"></b>秒</div>
    <div>スコア<b id="score">0</b></div>
    <div>連続<b id="combo">0</b></div>
  </div>
  <div id="tbar"><div id="tfill"></div></div>
  <div id="formula"></div>
  <div id="sub"></div>
  <div id="qa"></div>
  <div id="log"></div>
  <div id="types"></div>
  <div id="fb"></div>
</section>

<section id="end" class="panel hidden">
  <h1>タイムアップ！</h1>
  <p class="result">スコア <b id="fscore"></b><br>正答 <span id="facc"></span></p>
  <button class="primary" onclick="startGame()">もう一度</button>
  <a class="ghost" href="index.html">一覧へ戻る</a>
</section>
</main>

<script>
const $=id=>document.getElementById(id);
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a}
const TYPES=['イオン結晶','分子結晶','共有結合の結晶','金属結晶'];
// t: 0 ion / 1 mol / 2 cov / 3 metal
const DB=[
 ['NaCl',0,'塩化ナトリウム'],['KBr',0,'臭化カリウム'],['CaCl<sub>2</sub>',0,'塩化カルシウム'],
 ['MgO',0,'酸化マグネシウム'],['NH<sub>4</sub>Cl',0,'塩化アンモニウム(イオンからなる)'],
 ['CaO',0,'酸化カルシウム'],
 ['I<sub>2</sub>',1,'ヨウ素(昇華性)'],['CO<sub>2</sub>',1,'ドライアイス'],['H<sub>2</sub>O',1,'氷'],
 ['C<sub>10</sub>H<sub>8</sub>',1,'ナフタレン(昇華性)'],['C<sub>6</sub>H<sub>12</sub>O<sub>6</sub>',1,'グルコース'],
 ['C(ダイヤモンド)',2,'ダイヤモンド'],['SiO<sub>2</sub>',2,'二酸化ケイ素(水晶)'],
 ['Si',2,'ケイ素'],['SiC',2,'炭化ケイ素'],
 ['Fe',3,'鉄'],['Cu',3,'銅'],['Al',3,'アルミニウム'],['Na',3,'ナトリウム'],['Mg',3,'マグネシウム'],
];
// ミステリー用:黒鉛のような例外は除外済み
const QUESTIONS=[
 {t:'融点はかなり高い？',ans:['はい','いいえ','はい','はい']},
 {t:'固体のまま電気を通す？',ans:['いいえ','いいえ','いいえ','はい']},
 {t:'融解したり水溶液にしたりすると電気を通す？',ans:['はい','いいえ','いいえ','はい(融解)']},
 {t:'化学式は組成式で表す？',ans:['はい','いいえ(分子式)','はい','はい']},
 {t:'やわらかく、昇華するものもある？',ans:['いいえ','はい','いいえ','いいえ']},
 {t:'たたくとうすく広がる(展性)？',ans:['いいえ(もろい)','いいえ','いいえ','はい']},
];
const EXPL=[
 '陽イオンと陰イオンが静電気力(イオン結合)で結びつく。かたいがもろく、融解液・水溶液は電気を通す。',
 '分子が分子間力でゆるく集まる。やわらかく融点が低い。昇華するものも(I<sub>2</sub>, CO<sub>2</sub>, ナフタレン)。',
 '原子が共有結合だけで巨大な網目をつくる。きわめてかたく融点が非常に高い。',
 '自由電子が原子を結びつける。電気・熱をよく通し、展性・延性がある。',
];

let score=0,combo=0,ok=0,total=0,tLeft=0,timer=null,locked=false;
let pool=[],cur=null,mystery=false,qUsed=0,sinceMystery=0;

function startGame(){
  score=0;combo=0;ok=0;total=0;tLeft=120;sinceMystery=0;
  $('start').classList.add('hidden');$('end').classList.add('hidden');$('play').classList.remove('hidden');
  upd();next();
  clearInterval(timer);
  timer=setInterval(()=>{tLeft-=0.1;if(tLeft<=0){tLeft=0;finish();}
    $('time').textContent=Math.ceil(tLeft);
    $('tfill').style.width=(tLeft/120*100)+'%';},100);
}
function finish(){clearInterval(timer);$('play').classList.add('hidden');$('end').classList.remove('hidden');
  $('fscore').textContent=score;$('facc').textContent=ok+' 問 / '+total+' 問';}
function upd(){$('score').textContent=score;$('combo').textContent=combo;}

function next(){
  locked=false;$('fb').innerHTML='';$('log').innerHTML='';$('qa').innerHTML='';
  if(!pool.length)pool=shuffle(DB.slice());
  cur=pool.pop();qUsed=0;
  sinceMystery++;
  mystery=(sinceMystery>=3&&Math.random()<0.55);
  if(mystery)sinceMystery=0;
  const f=$('formula');
  if(mystery){
    f.innerHTML='？？？';f.classList.add('mystery');
    $('sub').textContent='ミステリー問題！質問して推理しよう(質問は3回まで・1回−50点)';
    QUESTIONS.forEach((q,i)=>{
      const b=document.createElement('button');
      b.className='qchip';b.textContent=q.t;
      b.onclick=()=>ask(q,b);
      $('qa').appendChild(b);
    });
  }else{
    f.innerHTML=cur[0];f.classList.remove('mystery');
    $('sub').textContent='この物質の結晶は？';
  }
  const tdiv=$('types');tdiv.innerHTML='';
  TYPES.forEach((t,i)=>{
    const b=document.createElement('button');
    b.innerHTML=t;b.onclick=()=>answer(i,b);
    tdiv.appendChild(b);
  });
}
function ask(q,btn){
  if(locked||qUsed>=3)return;
  qUsed++;
  btn.disabled=true;
  const a=q.ans[cur[1]];
  $('log').innerHTML+='<div>Q. '+q.t+' → <b>'+a+'</b></div>';
  if(qUsed>=3){[...$('qa').children].forEach(b=>b.disabled=true);}
}
function answer(i,btn){
  if(locked)return;locked=true;total++;
  const bs=$('types').children;
  bs[cur[1]].classList.add('correct');
  const name='<b>'+cur[0]+'</b>('+cur[2]+')は<b>'+TYPES[cur[1]]+'</b>。';
  if(i===cur[1]){
    ok++;combo++;
    const pts=mystery?Math.max(50,200-50*qUsed):(100+Math.min(combo,10)*10);
    score+=pts;
    $('fb').innerHTML='<span class="good">正解！+'+pts+'点</span> '+name+EXPL[cur[1]];
    setTimeout(next,mystery?1900:1000);
  }else{
    btn.classList.add('wrong');combo=0;
    $('fb').innerHTML='<span class="bad">ざんねん…</span> '+name+EXPL[cur[1]];
    setTimeout(next,2100);
  }
  upd();
}
</script>
</body>
</html>
