<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>元素マッチング | 化学ゲームラボ</title>
<style>
:root{--paper:#f3f6f5;--card:#fff;--ink:#1b2a33;--mut:#5b6f78;--line:#d5e0de;
--acc:#0e7c86;--amber:#e8a13d;--bad:#d4566a;--ok:#2e9e6b;
--mono:"SFMono-Regular",Consolas,"Courier New",monospace}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);
font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Yu Gothic",Meiryo,sans-serif;
touch-action:manipulation}
header{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--card);border-bottom:3px solid var(--acc)}
.back{color:var(--acc);text-decoration:none;font-weight:700;font-size:14px}
.htitle{font-weight:800;letter-spacing:.05em}
.chip{margin-left:auto;font-size:12px;color:var(--acc);border:1px solid var(--acc);border-radius:999px;padding:2px 10px}
main{max-width:560px;margin:0 auto;padding:16px 12px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;box-shadow:0 2px 10px rgba(27,42,51,.05)}
.hidden{display:none}
h1{font-size:22px;margin:0 0 8px}
.desc{color:var(--mut)}
.rules{color:var(--mut);font-size:14px;padding-left:20px;line-height:1.8}
.lvbtn{display:block;width:100%;margin-top:10px;padding:14px;font-size:16px;font-weight:800;
 border:2px solid var(--line);border-bottom-width:4px;background:#fff;border-radius:12px;cursor:pointer;color:var(--ink);font-family:inherit;transition:all .1s}
.lvbtn:active{transform:translateY(2px);border-bottom-width:2px}
.lvbtn b{color:var(--acc);margin-right:8px}
.primary{display:block;width:100%;margin-top:14px;padding:14px;font-size:17px;font-weight:800;color:#fff;background:var(--acc);border:0;border-radius:10px;cursor:pointer;font-family:inherit}
.ghost{display:block;text-align:center;margin-top:12px;color:var(--acc);font-weight:700;text-decoration:none;background:none;border:none;font-size:15px;cursor:pointer;width:100%;font-family:inherit}
.hud{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--mut);margin-bottom:8px}
.hud b{font-family:var(--mono);font-size:20px;color:var(--ink);margin-left:4px}
.tbar{height:10px;background:#e2ebe9;border-radius:99px;overflow:hidden;margin-bottom:14px}
#tfill{height:100%;width:100%;background:var(--acc);border-radius:99px;transition:width .1s linear}
.game-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.col{display:flex;flex-direction:column;gap:12px}
.slot{height:72px}
.match-btn{width:100%;height:72px;display:flex;align-items:center;justify-content:center;padding:4px;
 background:#fff;border:2px solid var(--line);border-bottom:4px solid var(--line);border-radius:12px;
 font-weight:800;font-size:15.5px;cursor:pointer;transition:opacity .3s,transform .3s,background .2s;color:var(--ink);font-family:inherit}
.match-btn.selected{background:#e2f2f3;border-color:var(--acc);color:var(--acc)}
.match-btn.fade-out{opacity:0;transform:scale(.9);pointer-events:none}
.match-btn.error{animation:sh .3s;background:#fbe3e7;border-color:var(--bad);color:var(--bad);pointer-events:none}
@keyframes sh{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.result{font-size:18px;text-align:center;line-height:2}
.result b{font-family:var(--mono);font-size:34px;color:var(--acc)}
</style>
</head>
<body>
<header>
  <a class="back" href="index.html">‹ 一覧</a>
  <div class="htitle">元素マッチング</div>
  <span class="chip">元素と周期表</span>
</header>
<main>
<section id="start" class="panel">
  <h1>元素マッチング 〜記号と名前をつなげ〜</h1>
  <p class="desc">左の<b>元素名</b>と右の<b>元素記号</b>、同じ元素のペアをタップして消していこう。制限時間は40秒!</p>
  <ul class="rules">
    <li>ペア成立で+10点。まちがえると少しのあいだ選べない</li>
    <li>Lv.1: 原子番号1〜20 / Lv.2: +受験頻出の元素 / Lv.3: 全118元素</li>
  </ul>
  <button class="lvbtn" onclick="startGame(1)"><b>Lv.1</b>基本20元素</button>
  <button class="lvbtn" onclick="startGame(2)"><b>Lv.2</b>+受験頻出</button>
  <button class="lvbtn" onclick="startGame(3)"><b>Lv.3</b>全118元素</button>
</section>

<section id="play" class="panel hidden">
  <div class="hud"><div>スコア<b id="score">0</b></div><div>Lv.<b id="lvdisp">1</b></div></div>
  <div class="tbar"><div id="tfill"></div></div>
  <div class="game-grid">
    <div class="col" id="left-col"></div>
    <div class="col" id="right-col"></div>
  </div>
</section>

<section id="end" class="panel hidden">
  <h1>タイムアップ！</h1>
  <p class="result">スコア <b id="fscore">0</b><br><span id="fnote"></span></p>
  <button class="primary" onclick="startGame(level)">同じレベルでもう一度</button>
  <button class="ghost" onclick="goHome()">レベル選択にもどる</button>
  <a class="ghost" href="index.html">一覧へ戻る</a>
</section>
</main>

<script>
const $=id=>document.getElementById(id);
const ALL=[
 {n:1,s:"H",m:"水素",l:1},{n:2,s:"He",m:"ヘリウム",l:1},{n:3,s:"Li",m:"リチウム",l:1},{n:4,s:"Be",m:"ベリリウム",l:1},{n:5,s:"B",m:"ホウ素",l:1},{n:6,s:"C",m:"炭素",l:1},{n:7,s:"N",m:"窒素",l:1},{n:8,s:"O",m:"酸素",l:1},{n:9,s:"F",m:"フッ素",l:1},{n:10,s:"Ne",m:"ネオン",l:1},{n:11,s:"Na",m:"ナトリウム",l:1},{n:12,s:"Mg",m:"マグネシウム",l:1},{n:13,s:"Al",m:"アルミニウム",l:1},{n:14,s:"Si",m:"ケイ素",l:1},{n:15,s:"P",m:"リン",l:1},{n:16,s:"S",m:"硫黄",l:1},{n:17,s:"Cl",m:"塩素",l:1},{n:18,s:"Ar",m:"アルゴン",l:1},{n:19,s:"K",m:"カリウム",l:1},{n:20,s:"Ca",m:"カルシウム",l:1},
 {n:24,s:"Cr",m:"クロム",l:2},{n:25,s:"Mn",m:"マンガン",l:2},{n:26,s:"Fe",m:"鉄",l:2},{n:27,s:"Co",m:"コバルト",l:2},{n:28,s:"Ni",m:"ニッケル",l:2},{n:29,s:"Cu",m:"銅",l:2},{n:30,s:"Zn",m:"亜鉛",l:2},{n:35,s:"Br",m:"臭素",l:2},{n:47,s:"Ag",m:"銀",l:2},{n:48,s:"Cd",m:"カドミウム",l:2},{n:50,s:"Sn",m:"スズ",l:2},{n:53,s:"I",m:"ヨウ素",l:2},{n:56,s:"Ba",m:"バリウム",l:2},{n:78,s:"Pt",m:"白金",l:2},{n:79,s:"Au",m:"金",l:2},{n:80,s:"Hg",m:"水銀",l:2},{n:82,s:"Pb",m:"鉛",l:2},
 {n:21,s:"Sc",m:"スカンジウム",l:3},{n:22,s:"Ti",m:"チタン",l:3},{n:23,s:"V",m:"バナジウム",l:3},{n:31,s:"Ga",m:"ガリウム",l:3},{n:32,s:"Ge",m:"ゲルマニウム",l:3},{n:33,s:"As",m:"ヒ素",l:3},{n:34,s:"Se",m:"セレン",l:3},{n:36,s:"Kr",m:"クリプトン",l:3},{n:37,s:"Rb",m:"ルビジウム",l:3},{n:38,s:"Sr",m:"ストロンチウム",l:3},{n:39,s:"Y",m:"イットリウム",l:3},{n:40,s:"Zr",m:"ジルコニウム",l:3},{n:41,s:"Nb",m:"ニオブ",l:3},{n:42,s:"Mo",m:"モリブデン",l:3},{n:43,s:"Tc",m:"テクネチウム",l:3},{n:44,s:"Ru",m:"ルテニウム",l:3},{n:45,s:"Rh",m:"ロジウム",l:3},{n:46,s:"Pd",m:"パラジウム",l:3},{n:49,s:"In",m:"インジウム",l:3},{n:51,s:"Sb",m:"アンチモン",l:3},{n:52,s:"Te",m:"テルル",l:3},{n:54,s:"Xe",m:"キセノン",l:3},{n:55,s:"Cs",m:"セシウム",l:3},{n:57,s:"La",m:"ランタン",l:3},{n:58,s:"Ce",m:"セリウム",l:3},{n:59,s:"Pr",m:"プラセオジム",l:3},{n:60,s:"Nd",m:"ネオジム",l:3},{n:61,s:"Pm",m:"プロメチウム",l:3},{n:62,s:"Sm",m:"サマリウム",l:3},{n:63,s:"Eu",m:"ユウロピウム",l:3},{n:64,s:"Gd",m:"ガドリニウム",l:3},{n:65,s:"Tb",m:"テルビウム",l:3},{n:66,s:"Dy",m:"ジスプロシウム",l:3},{n:67,s:"Ho",m:"ホルミウム",l:3},{n:68,s:"Er",m:"エルビウム",l:3},{n:69,s:"Tm",m:"ツリウム",l:3},{n:70,s:"Yb",m:"イッテルビウム",l:3},{n:71,s:"Lu",m:"ルテチウム",l:3},{n:72,s:"Hf",m:"ハフニウム",l:3},{n:73,s:"Ta",m:"タンタル",l:3},{n:74,s:"W",m:"タングステン",l:3},{n:75,s:"Re",m:"レニウム",l:3},{n:76,s:"Os",m:"オスミウム",l:3},{n:77,s:"Ir",m:"イリジウム",l:3},{n:81,s:"Tl",m:"タリウム",l:3},{n:83,s:"Bi",m:"ビスマス",l:3},{n:84,s:"Po",m:"ポロニウム",l:3},{n:85,s:"At",m:"アスタチン",l:3},{n:86,s:"Rn",m:"ラドン",l:3},{n:87,s:"Fr",m:"フランシウム",l:3},{n:88,s:"Ra",m:"ラジウム",l:3},{n:89,s:"Ac",m:"アクチニウム",l:3},{n:90,s:"Th",m:"トリウム",l:3},{n:91,s:"Pa",m:"プロトアクチニウム",l:3},{n:92,s:"U",m:"ウラン",l:3},{n:93,s:"Np",m:"ネプツニウム",l:3},{n:94,s:"Pu",m:"プルトニウム",l:3},{n:95,s:"Am",m:"アメリシウム",l:3},{n:96,s:"Cm",m:"キュリウム",l:3},{n:97,s:"Bk",m:"バークリウム",l:3},{n:98,s:"Cf",m:"カリホルニウム",l:3},{n:99,s:"Es",m:"アインスタイニウム",l:3},{n:100,s:"Fm",m:"フェルミウム",l:3},{n:101,s:"Md",m:"メンデレビウム",l:3},{n:102,s:"No",m:"ノーベリウム",l:3},{n:103,s:"Lr",m:"ローレンシウム",l:3},{n:104,s:"Rf",m:"ラザホージウム",l:3},{n:105,s:"Db",m:"ドブニウム",l:3},{n:106,s:"Sg",m:"シーボーギウム",l:3},{n:107,s:"Bh",m:"ボーリウム",l:3},{n:108,s:"Hs",m:"ハッシウム",l:3},{n:109,s:"Mt",m:"マイトネリウム",l:3},{n:110,s:"Ds",m:"ダームスタチウム",l:3},{n:111,s:"Rg",m:"レントゲニウム",l:3},{n:112,s:"Cn",m:"コペルニシウム",l:3},{n:113,s:"Nh",m:"ニホニウム",l:3},{n:114,s:"Fl",m:"フレロビウム",l:3},{n:115,s:"Mc",m:"モスコビウム",l:3},{n:116,s:"Lv",m:"リバモリウム",l:3},{n:117,s:"Ts",m:"テネシン",l:3},{n:118,s:"Og",m:"オガネソン",l:3}
];

let pool=[],score=0,timeLeft=40,timer=null,selL=null,selR=null,level=1;

function startGame(lv){
  level=lv;
  $('start').classList.add('hidden');$('end').classList.add('hidden');$('play').classList.remove('hidden');
  $('lvdisp').textContent=lv;
  pool=ALL.filter(e=>e.l<=lv);
  score=0;selL=null;selR=null;
  $('score').textContent='0';
  initGrid();
  timeLeft=40;
  clearInterval(timer);
  timer=setInterval(()=>{
    timeLeft-=0.1;
    $('tfill').style.width=Math.max(0,timeLeft/40*100)+'%';
    if(timeLeft<=0)endGame();
  },100);
}
function goHome(){
  clearInterval(timer);
  $('play').classList.add('hidden');$('end').classList.add('hidden');$('start').classList.remove('hidden');
}
function endGame(){
  clearInterval(timer);
  $('play').classList.add('hidden');$('end').classList.remove('hidden');
  $('fscore').textContent=score;
  $('fnote').textContent='Lv.'+level+'('+(level===1?'基本20元素':level===2?'受験頻出':'全118元素')+')';
}

function initGrid(){
  const L=$('left-col'),R=$('right-col');
  L.innerHTML='';R.innerHTML='';
  for(let i=0;i<5;i++){
    const ls=document.createElement('div');ls.className='slot';ls.id='l-slot-'+i;
    const rs=document.createElement('div');rs.className='slot';rs.id='r-slot-'+i;
    L.appendChild(ls);R.appendChild(rs);
  }
  const set=[...pool].sort(()=>0.5-Math.random()).slice(0,5);
  const li=[0,1,2,3,4].sort(()=>0.5-Math.random());
  const ri=[0,1,2,3,4].sort(()=>0.5-Math.random());
  set.forEach((el,idx)=>{
    $('l-slot-'+li[idx]).appendChild(createBtn(el.n,el.m,'left'));
    $('r-slot-'+ri[idx]).appendChild(createBtn(el.n,el.s,'right'));
  });
}
function createBtn(id,text,side){
  const b=document.createElement('button');
  b.className='match-btn';b.textContent=text;b.dataset.id=id;
  b.onclick=()=>handleSelect(b,side);
  return b;
}
function handleSelect(btn,side){
  if(btn.classList.contains('fade-out')||btn.classList.contains('error'))return;
  if(side==='left'){if(selL)selL.classList.remove('selected');selL=btn;}
  else{if(selR)selR.classList.remove('selected');selR=btn;}
  btn.classList.add('selected');
  if(selL&&selR)checkMatch();
}
function checkMatch(){
  const l=selL,r=selR;
  selL=null;selR=null;
  if(l.dataset.id===r.dataset.id){
    score+=10;$('score').textContent=score;
    l.classList.add('fade-out');r.classList.add('fade-out');
    setTimeout(()=>{l.remove();r.remove();setTimeout(replenish,100);},700);
  }else{
    l.classList.add('error');r.classList.add('error');
    setTimeout(()=>{l.classList.remove('error','selected');r.classList.remove('error','selected');},500);
  }
}
function replenish(){
  const el=pool[Math.floor(Math.random()*pool.length)];
  const ls=[],rs=[];
  for(let i=0;i<5;i++){
    if(!$('l-slot-'+i).hasChildNodes())ls.push(i);
    if(!$('r-slot-'+i).hasChildNodes())rs.push(i);
  }
  if(ls.length)$('l-slot-'+ls[Math.floor(Math.random()*ls.length)]).appendChild(createBtn(el.n,el.m,'left'));
  if(rs.length)$('r-slot-'+rs[Math.floor(Math.random()*rs.length)]).appendChild(createBtn(el.n,el.s,'right'));
}
</script>
</body>
</html>
